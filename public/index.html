<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Command Desk | CSP Targets</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --surface-color: #1a1d24;
            --border-color: #2a2d35;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --hot: #ec4899;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.025em; }
        .timestamp { color: var(--text-secondary); font-size: 0.875rem; }

        .card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .data-point {
            display: flex;
            flex-direction: column;
        }

        .data-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .data-value {
            font-size: 1.125rem;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-variant-numeric: tabular-nums;
        }

        th {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(255,255,255,0.02);
            white-space: nowrap;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.875rem;
        }

        tr:hover td {
            background-color: rgba(255,255,255,0.02);
        }

        .status-fire { color: var(--success); font-weight: 600; }
        .status-hot { color: var(--hot); font-weight: 600; }
        .status-watch { color: var(--warning); font-weight: 600; }
        .status-skip { color: var(--danger); }

        .tech-box {
            font-size: 0.75rem;
            background: rgba(255,255,255,0.05);
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 4px;
            display: inline-block;
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Vortex Command Desk | CSP Scanner</h1>
                <div class="timestamp" id="last-updated">Loading...</div>
            </div>
            <button id="refresh-btn" style="background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 6px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
                Refresh View
            </button>
        </header>

        <div id="best-trade-container"></div>
        
        <div class="card">
            <div class="card-title">Top Targets</div>
            <div class="table-wrapper">
                <table id="targets-table">
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Spot</th>
                            <th>Strike</th>
                            <th>DTE</th>
                            <th>Premium</th>
                            <th>Delta</th>
                            <th>ROC%</th>
                            <th>Buffer</th>
                            <th>Support / Res</th>
                            <th>Valuation</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
